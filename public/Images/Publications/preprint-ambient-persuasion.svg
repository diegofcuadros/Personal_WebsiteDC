<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Ambient persuasion in deployed AI agents</title>
  <desc id="desc">Abstract publication artwork showing a deployed agent, subtle exposure waves, and oversight boundaries.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111820"/>
      <stop offset="0.46" stop-color="#1c3133"/>
      <stop offset="1" stop-color="#e9c46a"/>
    </linearGradient>
    <radialGradient id="pulse" cx="47%" cy="43%" r="62%">
      <stop offset="0" stop-color="#ff6b4a" stop-opacity="0.30"/>
      <stop offset="0.50" stop-color="#ff6b4a" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#ff6b4a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="core" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f4f1de"/>
      <stop offset="0.48" stop-color="#9ad7c7"/>
      <stop offset="1" stop-color="#264653"/>
    </linearGradient>
    <linearGradient id="signal" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#e76f51" stop-opacity="0"/>
      <stop offset="0.38" stop-color="#e76f51" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#f4a261" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#071015" flood-opacity="0.45"/>
    </filter>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.07"/>
      </feComponentTransfer>
    </filter>
  </defs>

  <rect width="1200" height="800" fill="url(#bg)"/>
  <rect width="1200" height="800" fill="url(#pulse)"/>
  <rect width="1200" height="800" filter="url(#grain)" opacity="0.38"/>

  <g opacity="0.78">
    <path d="M86 224 C214 166 311 162 430 219 C577 289 674 289 815 224 C934 169 1036 171 1138 218" fill="none" stroke="#f4f1de" stroke-opacity="0.20" stroke-width="2"/>
    <path d="M76 579 C218 498 350 513 468 583 C609 667 724 668 862 580 C959 518 1051 508 1132 554" fill="none" stroke="#f4f1de" stroke-opacity="0.14" stroke-width="2"/>
  </g>

  <g transform="translate(600 400)" filter="url(#shadow)">
    <circle r="238" fill="#0f2429" stroke="#f4f1de" stroke-opacity="0.16" stroke-width="2"/>
    <circle r="190" fill="none" stroke="#9ad7c7" stroke-opacity="0.22" stroke-width="22"/>
    <circle r="190" fill="none" stroke="#e76f51" stroke-opacity="0.85" stroke-width="4" stroke-dasharray="34 24"/>
    <circle r="118" fill="url(#core)"/>
    <circle r="80" fill="#10232a" opacity="0.88"/>
    <path d="M-42 -12 C-24 -48 22 -48 43 -12 C63 24 41 60 0 60 C-41 60 -63 24 -42 -12 Z" fill="none" stroke="#f4f1de" stroke-width="7" stroke-linecap="round"/>
    <circle cx="-27" cy="1" r="8" fill="#f4f1de"/>
    <circle cx="27" cy="1" r="8" fill="#f4f1de"/>
    <path d="M-30 34 C-9 47 12 47 33 34" fill="none" stroke="#f4f1de" stroke-width="6" stroke-linecap="round"/>
  </g>

  <g fill="none" stroke-linecap="round">
    <path d="M146 347 C262 296 354 297 473 354" stroke="url(#signal)" stroke-width="26" opacity="0.54"/>
    <path d="M727 350 C849 294 965 304 1072 363" stroke="url(#signal)" stroke-width="24" opacity="0.44"/>
    <path d="M161 458 C300 510 381 507 479 452" stroke="url(#signal)" stroke-width="18" opacity="0.35"/>
    <path d="M732 455 C846 512 961 508 1072 448" stroke="url(#signal)" stroke-width="18" opacity="0.42"/>
  </g>

  <g opacity="0.86">
    <rect x="148" y="293" width="166" height="112" rx="28" fill="#182e31" stroke="#f4f1de" stroke-opacity="0.28"/>
    <rect x="886" y="289" width="166" height="112" rx="28" fill="#182e31" stroke="#f4f1de" stroke-opacity="0.28"/>
    <rect x="167" y="318" width="127" height="12" rx="6" fill="#f4f1de" opacity="0.74"/>
    <rect x="167" y="347" width="91" height="12" rx="6" fill="#e76f51" opacity="0.90"/>
    <rect x="905" y="318" width="127" height="12" rx="6" fill="#f4f1de" opacity="0.74"/>
    <rect x="905" y="347" width="91" height="12" rx="6" fill="#e76f51" opacity="0.90"/>
    <circle cx="282" cy="373" r="9" fill="#f4a261"/>
    <circle cx="1020" cy="373" r="9" fill="#f4a261"/>
  </g>

  <g opacity="0.74" fill="none" stroke="#f4f1de" stroke-linecap="round" stroke-linejoin="round">
    <path d="M599 113 C713 114 814 161 891 238" stroke-opacity="0.18" stroke-width="18"/>
    <path d="M599 687 C713 686 814 639 891 562" stroke-opacity="0.18" stroke-width="18"/>
    <path d="M599 113 C713 114 814 161 891 238" stroke-opacity="0.60" stroke-width="3" stroke-dasharray="18 20"/>
    <path d="M599 687 C713 686 814 639 891 562" stroke-opacity="0.60" stroke-width="3" stroke-dasharray="18 20"/>
  </g>

  <g opacity="0.80">
    <path d="M343 638 L393 551 L443 638 Z" fill="#2a3f3f" stroke="#f4a261" stroke-width="5"/>
    <path d="M393 582 L393 616" stroke="#f4a261" stroke-width="7" stroke-linecap="round"/>
    <circle cx="393" cy="630" r="4" fill="#f4a261"/>
  </g>

  <g fill="#f4f1de" opacity="0.32">
    <circle cx="92" cy="119" r="5"/>
    <circle cx="119" cy="160" r="3"/>
    <circle cx="1112" cy="132" r="4"/>
    <circle cx="1085" cy="649" r="5"/>
    <circle cx="170" cy="662" r="4"/>
    <circle cx="1002" cy="512" r="3"/>
  </g>
</svg>
