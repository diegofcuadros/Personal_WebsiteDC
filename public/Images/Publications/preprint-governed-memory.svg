    <path d="M730 547 L741 558 L760 533" fill="none" stroke="#f8d28b" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g stroke-linecap="round" stroke-linejoin="round">
    <path d="M243 250 L414 239" stroke="#dff8ee" stroke-opacity="0.45" stroke-width="4"/>
    <path d="M247 543 L414 547" stroke="#dff8ee" stroke-opacity="0.36" stroke-width="4"/>
