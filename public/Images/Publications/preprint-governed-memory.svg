<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Governed collaborative memory in AI agent systems</title>
  <desc id="desc">Abstract publication artwork showing linked agents, a governed memory archive, and a selection filter.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07151f"/>
      <stop offset="0.52" stop-color="#0e2a31"/>
      <stop offset="1" stop-color="#f0b35b"/>
    </linearGradient>
    <radialGradient id="glow" cx="42%" cy="35%" r="58%">
      <stop offset="0" stop-color="#7ee4c3" stop-opacity="0.38"/>
      <stop offset="0.58" stop-color="#7ee4c3" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#7ee4c3" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ledger" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#dff8ee" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#8fd8bc" stop-opacity="0.70"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8d28b"/>
      <stop offset="1" stop-color="#d8793c"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#031016" flood-opacity="0.40"/>
    </filter>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.08"/>
      </feComponentTransfer>
    </filter>
  </defs>

  <rect width="1200" height="800" fill="url(#bg)"/>
  <rect width="1200" height="800" fill="url(#glow)"/>
  <rect width="1200" height="800" filter="url(#grain)" opacity="0.35"/>

  <path d="M92 620 C260 535 323 455 489 482 C654 509 708 642 913 566 C1000 534 1077 489 1141 436" fill="none" stroke="#f7d59a" stroke-opacity="0.22" stroke-width="2"/>
  <path d="M75 188 C235 250 349 151 494 229 C669 323 740 268 860 197 C955 142 1040 132 1145 172" fill="none" stroke="#7ee4c3" stroke-opacity="0.20" stroke-width="2"/>

  <g filter="url(#softShadow)">
    <rect x="383" y="173" width="438" height="454" rx="38" fill="#0b2229" stroke="#c7f2e1" stroke-opacity="0.28"/>
    <rect x="414" y="210" width="376" height="58" rx="18" fill="url(#ledger)" opacity="0.96"/>
    <rect x="414" y="287" width="376" height="58" rx="18" fill="url(#ledger)" opacity="0.76"/>
    <rect x="414" y="364" width="376" height="58" rx="18" fill="url(#ledger)" opacity="0.60"/>
    <rect x="414" y="441" width="376" height="58" rx="18" fill="url(#ledger)" opacity="0.42"/>
    <rect x="414" y="518" width="248" height="58" rx="18" fill="url(#amber)" opacity="0.94"/>
