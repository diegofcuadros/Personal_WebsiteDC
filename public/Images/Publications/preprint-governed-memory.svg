  <g opacity="0.82">
    <path d="M862 166 C914 225 940 298 940 384 C940 500 892 601 813 665" fill="none" stroke="#f8d28b" stroke-opacity="0.30" stroke-width="10" stroke-linecap="round"/>
    <path d="M846 180 C895 235 920 304 920 384 C920 490 876 584 804 643" fill="none" stroke="#f8d28b" stroke-opacity="0.72" stroke-width="3" stroke-linecap="round" stroke-dasharray="16 20"/>
    <circle cx="900" cy="392" r="16" fill="#f8d28b"/>
    <circle cx="884" cy="466" r="10" fill="#f8d28b" opacity="0.72"/>
    <circle cx="870" cy="308" r="10" fill="#f8d28b" opacity="0.72"/>
