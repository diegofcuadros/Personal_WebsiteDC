    <circle cx="247" cy="543" r="58" fill="#123743" stroke="#7ee4c3" stroke-width="3"/>
    <circle cx="957" cy="249" r="58" fill="#123743" stroke="#7ee4c3" stroke-width="3"/>
    <circle cx="961" cy="543" r="58" fill="#3c2b20" stroke="#f8d28b" stroke-width="3"/>
    <circle cx="604" cy="113" r="48" fill="#123743" stroke="#7ee4c3" stroke-width="3"/>
    <circle cx="604" cy="690" r="48" fill="#3c2b20" stroke="#f8d28b" stroke-width="3"/>

